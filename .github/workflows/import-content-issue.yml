name: Convert website update issue with AI

on:
  issues:
    types: [opened, edited, reopened]

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: website-content-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  convert:
    if: >-
      startsWith(github.event.issue.title, '[Website]') &&
      contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.issue.author_association)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - run: pip install -r requirements.txt
      - name: Save issue content
        env:
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          mkdir -p incoming-runtime
          python - <<'PY'
          import os
          from pathlib import Path
          Path('incoming-runtime/content-issue.txt').write_text(
              'Title: ' + os.getenv('ISSUE_TITLE', '') + '\n\n' + os.getenv('ISSUE_BODY', ''),
              encoding='utf-8'
          )
          PY
      - name: Structure and merge content
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_MODEL: ${{ vars.OPENROUTER_MODEL }}
        run: |
          python scripts/import_content_issue.py \
            --issue-file incoming-runtime/content-issue.txt \
            --issue-id "${{ github.event.issue.number }}"
          python scripts/validate_content.py
      - name: Commit review branch
        id: commit
        run: |
          BRANCH="automation/website-issue-${{ github.event.issue.number }}"
          git config user.name "xielab-site-bot"
          git config user.email "actions@users.noreply.github.com"
          git checkout -B "$BRANCH"
          git add data imports/reports
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git commit -m "content: process website issue ${{ github.event.issue.number }}"
          git push --force-with-lease origin "$BRANCH"
          echo "changed=true" >> "$GITHUB_OUTPUT"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"
      - name: Open review pull request
        if: steps.commit.outputs.changed == 'true'
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH: ${{ steps.commit.outputs.branch }}
        run: |
          PR_URL=$(gh pr list --repo "${{ github.repository }}" --head "$BRANCH" --state open --json url --jq '.[0].url')
          if [ -z "$PR_URL" ]; then
            PR_URL=$(gh pr create --repo "${{ github.repository }}" \
              --base "${{ github.event.repository.default_branch }}" --head "$BRANCH" \
              --title "Website content update from issue ${{ github.event.issue.number }}" \
              --body "AI-structured website update. Review all facts, links, dates, identifiers and translations before merging. See the generated report under imports/reports/.")
          fi
          echo "url=$PR_URL" >> "$GITHUB_OUTPUT"
      - name: Comment on issue
        if: steps.commit.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ steps.pr.outputs.url }}
        run: gh issue comment "${{ github.event.issue.number }}" --repo "${{ github.repository }}" --body "The AI content update is ready for review: ${PR_URL}"

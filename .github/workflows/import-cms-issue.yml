name: Apply Editorial Console update

on:
  issues:
    types: [opened, edited, reopened]

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: editorial-console-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  apply:
    if: >-
      startsWith(github.event.issue.title, '[CMS]') &&
      contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.issue.author_association)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Save issue payload
        env:
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          mkdir -p incoming-runtime
          python - <<'PY'
          import os
          from pathlib import Path
          Path('incoming-runtime/cms-issue.txt').write_text(
              'Title: ' + os.getenv('ISSUE_TITLE', '') + '\n\n' + os.getenv('ISSUE_BODY', ''),
              encoding='utf-8'
          )
          PY

      - name: Apply structured update
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_MODEL: ${{ vars.OPENROUTER_MODEL }}
        run: |
          python scripts/import_cms_issue.py \
            --issue-file incoming-runtime/cms-issue.txt \
            --issue-id "${{ github.event.issue.number }}"
          python scripts/validate_content.py

      - name: Create review branch and commit
        id: commit
        run: |
          BRANCH="automation/editorial-console-${{ github.event.issue.number }}"
          git config user.name "xielab-site-bot"
          git config user.email "actions@users.noreply.github.com"
          git checkout -B "$BRANCH"
          git add data imports/reports
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git commit -m "content: apply editorial console issue ${{ github.event.issue.number }}"
          git push --force-with-lease origin "$BRANCH"
          echo "changed=true" >> "$GITHUB_OUTPUT"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"

      - name: Open or update review pull request
        if: steps.commit.outputs.changed == 'true'
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH: ${{ steps.commit.outputs.branch }}
        run: |
          cat > /tmp/pr-body.md <<'BODY'
          ## Editorial Console update

          This pull request was generated from the section-by-section Xie Lab Editorial Console.

          The workflow parsed a deterministic JSON payload, optionally polished approved bilingual fields with OpenRouter, updated only the selected collection, validated the complete website dataset and generated an audit report under `imports/reports/`.

          ### Required review
          - Confirm names, factual statements, identifiers, dates and external links.
          - Confirm English and Chinese wording.
          - Confirm public contact details and profile photographs.
          - Confirm any deletion or alumni transition is intentional.

          Merge only after review. Merging triggers the website deployment workflow.
          BODY
          PR_URL=$(gh pr list --repo "${{ github.repository }}" --head "$BRANCH" --state open --json url --jq '.[0].url')
          if [ -z "$PR_URL" ]; then
            PR_URL=$(gh pr create \
              --repo "${{ github.repository }}" \
              --base "${{ github.event.repository.default_branch }}" \
              --head "$BRANCH" \
              --title "Editorial Console update from issue ${{ github.event.issue.number }}" \
              --body-file /tmp/pr-body.md)
          fi
          echo "url=$PR_URL" >> "$GITHUB_OUTPUT"

      - name: Comment with review link
        if: steps.commit.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ steps.pr.outputs.url }}
        run: |
          gh issue comment "${{ github.event.issue.number }}" \
            --repo "${{ github.repository }}" \
            --body "The structured website update passed validation and is ready for review: ${PR_URL}"

      - name: Report no changes
        if: steps.commit.outputs.changed == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue comment "${{ github.event.issue.number }}" \
            --repo "${{ github.repository }}" \
            --body "The Editorial Console request produced no data changes."
